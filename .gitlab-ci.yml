stages:
  - build
  - deploy

build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_TAG: $CI_REGISTRY_IMAGE:latest
    GIT_STRATEGY: clone
  before_script:
    - git config --global url."https://oauth2:${CI_GIT_TOKEN}@gitlab.com/".insteadOf "https://gitlab.com/"
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG

pages:
  stage: deploy
  image: alpine:3.20
  script:
    - mkdir -p public
    - cp -r docs/. public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
